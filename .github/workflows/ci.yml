name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:




  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify)
        uses: docker/build-push-action@v5
        with:
          push: false

